<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Arsip Pro | Monster Edition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Config untuk Warna Hijau Monster -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        monster: '#39FF14', // Hijau Monster Neon
                        monsterDark: '#2ebd0d',
                        darkBg: '#0b1121', // Latar belakang gelap
                        glassBg: 'rgba(17, 24, 39, 0.7)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            background-color: #0b1121;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(114,100%,54%,0.05) 0, transparent 50%);
            color: #e2e8f0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Efek Kaca (Glassmorphism) */
        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(57, 255, 20, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .glass-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            border-color: #39FF14;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
            outline: none;
        }

        /* Sembunyikan Scrollbar tapi tetap bisa di-scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(57, 255, 20, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(57, 255, 20, 0.5); }

        /* Animasi Transisi Halaman */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden font-sans">

    <!-- Kontainer Utama Aplikasi -->
    <div class="flex-1 w-full max-w-md md:max-w-5xl lg:max-w-6xl mx-auto relative flex flex-col h-full glass border-x-0 sm:border-x border-monster/20 sm:my-4 sm:rounded-3xl sm:h-[calc(100vh-2rem)] shadow-2xl shadow-monster/5">
        
        <!-- Header -->
        <header class="px-6 pt-8 pb-4 z-10">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-white tracking-wide">E-<span class="text-monster drop-shadow-[0_0_8px_rgba(57,255,20,0.5)]">Arsip</span></h1>
                    <p class="text-xs md:text-sm text-slate-400 mt-1">Sistem Manajemen Dokumen</p>
                </div>
                <div class="w-10 h-10 rounded-full border-2 border-monster flex items-center justify-center bg-slate-800 relative overflow-hidden">
                    <i data-lucide="user" class="text-monster w-5 h-5"></i>
                </div>
            </div>
        </header>

        <!-- Area Konten Dinamis -->
        <main id="app-content" class="flex-1 overflow-y-auto px-6 pb-24 fade-in">
            <!-- Konten akan di-render di sini oleh JavaScript -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="absolute bottom-0 w-full glass rounded-b-none sm:rounded-b-3xl border-t border-monster/20 px-6 py-4 z-20">
            <div class="flex justify-between md:justify-center md:gap-24 items-center">
                <button onclick="navigate('dashboard')" id="nav-dashboard" class="nav-btn flex flex-col items-center gap-1 text-monster transition-colors w-16">
                    <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                    <span class="text-[10px] font-medium">Dashboard</span>
                </button>
                <button onclick="navigate('search')" id="nav-search" class="nav-btn flex flex-col items-center gap-1 text-slate-400 hover:text-monster transition-colors w-16">
                    <i data-lucide="search" class="w-6 h-6"></i>
                    <span class="text-[10px] font-medium">Cari File</span>
                </button>
                
                <!-- Tombol Tambah Tengah (Floating) -->
                <div class="relative -top-8">
                    <button onclick="navigate('input')" class="w-14 h-14 rounded-full bg-monster hover:bg-monsterDark text-darkBg flex items-center justify-center shadow-[0_0_15px_rgba(57,255,20,0.4)] transition-transform hover:scale-105 active:scale-95">
                        <i data-lucide="plus" class="w-7 h-7"></i>
                    </button>
                </div>

                <button onclick="navigate('drive')" id="nav-drive" class="nav-btn flex flex-col items-center gap-1 text-slate-400 hover:text-monster transition-colors w-16">
                    <i data-lucide="hard-drive" class="w-6 h-6"></i>
                    <span class="text-[10px] font-medium">Drive</span>
                </button>
                <button onclick="navigate('settings')" id="nav-settings" class="nav-btn flex flex-col items-center gap-1 text-slate-400 hover:text-monster transition-colors w-16">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                    <span class="text-[10px] font-medium">Pengaturan</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Notifikasi Toast -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-monster text-darkBg px-4 py-2 rounded-lg font-semibold shadow-lg shadow-monster/30 transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none z-50 flex items-center gap-2">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-msg">Berhasil!</span>
    </div>

    <!-- Logika Aplikasi (JavaScript) -->
    <script>
        // Inisialisasi Ikon
        lucide.createIcons();

        // --- KONFIGURASI API ---
        // PASTIKAN ANDA MENGGANTI URL DI BAWAH INI DENGAN URL WEB APP GAS ANDA
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbynbDyrrPkY6vBkJkryaHItZX1UTsqJQWbHHpHKLRARcVXlSeCf97Xj4wjgdZCL4rrN/exec'; 

        // --- DATA STATE ---
        let dataArsip = [];
        let isLoading = true; // Status loading saat mengambil data dari Drive

        // --- FUNGSI MENGAMBIL DATA DARI GAS ---
        async function fetchData() {
            isLoading = true;
            // Hanya render ulang dashboard jika sedang di halaman dashboard
            if(document.getElementById('nav-dashboard').classList.contains('text-monster')) {
                renderDashboard(); 
            }
            
            try {
                // Cek jika URL belum diganti (masih bawaan template)
                if(GAS_API_URL.includes('AKfycb...')) {
                    console.warn("Menggunakan data Mockup karena URL API belum diganti.");
                    dataArsip = [
                        { id: 1, nama: 'Contoh_Laporan_Belum_Konek.pdf', tipe: 'pdf', tanggal: '16 Apr 2026', ukuran: '2.4 MB', kategori: 'Keuangan', url: '#' },
                        { id: 2, nama: 'Data_Pegawai.xlsx', tipe: 'xlsx', tanggal: '15 Apr 2026', ukuran: '1.1 MB', kategori: 'Kepegawaian', url: '#' }
                    ];
                } else {
                    const response = await fetch(GAS_API_URL);
                    const result = await response.json();
                    
                    if(Array.isArray(result)) {
                        // Urutkan data berdasarkan tanggal terbaru jika memungkinkan
                        dataArsip = result.reverse(); 
                    } else if(result.error) {
                        showToast("Error dari Drive: " + result.error);
                    }
                }
            } catch (error) {
                console.error("Gagal mengambil data:", error);
                showToast("Gagal terhubung ke Database Google Drive.");
            } finally {
                isLoading = false;
                // Render ulang halaman aktif setelah data berhasil dimuat
                const activeNav = document.querySelector('.nav-btn.text-monster');
                if(activeNav) {
                    const view = activeNav.id.replace('nav-', '');
                    navigate(view);
                } else {
                    navigate('dashboard');
                }
            }
        }

        // --- RENDERER HALAMAN ---
        const contentArea = document.getElementById('app-content');

        // 1. Tampilan Dashboard Utama
        function renderDashboard() {
            let totalFiles = dataArsip.length;
            
            // Hitung dokumen terbaru (3 teratas)
            let recentFilesHtml = '';
            if (isLoading) {
                recentFilesHtml = `<div class="col-span-full text-center py-6 text-slate-400"><i data-lucide="loader" class="w-6 h-6 animate-spin mx-auto mb-2 text-monster"></i> Membaca dari Google Drive...</div>`;
            } else if (totalFiles === 0) {
                recentFilesHtml = `<div class="col-span-full text-center py-6 text-slate-400">Belum ada dokumen di Drive.</div>`;
            } else {
                recentFilesHtml = dataArsip.slice(0, 3).map(file => createFileCard(file)).join('');
            }

            contentArea.innerHTML = `
                <div class="fade-in">
                    <!-- Kartu Statistik -->
                    <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-5 rounded-2xl border border-slate-700 shadow-lg relative overflow-hidden mb-6">
                        <div class="absolute -right-4 -top-4 w-24 h-24 bg-monster/10 rounded-full blur-xl"></div>
                        <h2 class="text-slate-300 text-sm font-medium">Total Dokumen Arsip</h2>
                        <div class="flex items-end gap-3 mt-2">
                            <span class="text-4xl font-bold text-white">${totalFiles}</span>
                            <span class="text-monster text-sm font-medium mb-1 flex items-center"><i data-lucide="trending-up" class="w-4 h-4 mr-1"></i> Terhubung ke Drive</span>
                        </div>
                    </div>

                    <!-- Kategori Cepat -->
                    <div class="grid grid-cols-4 md:grid-cols-8 gap-3 mb-8">
                        ${createCategoryBtn('pdf', 'PDF', 'text-red-400', 'bg-red-400/10')}
                        ${createCategoryBtn('file-text', 'Word', 'text-blue-400', 'bg-blue-400/10')}
                        ${createCategoryBtn('presentation', 'PPT', 'text-orange-400', 'bg-orange-400/10')}
                        ${createCategoryBtn('table', 'Excel', 'text-green-400', 'bg-green-400/10')}
                    </div>

                    <!-- Arsip Terbaru -->
                    <div class="flex justify-between items-end mb-4">
                        <h3 class="text-lg font-semibold text-white">Arsip Terbaru</h3>
                        <button onclick="navigate('search')" class="text-xs text-monster hover:underline">Lihat Semua</button>
                    </div>
                    <div class="space-y-3 md:grid md:grid-cols-2 lg:grid-cols-3 md:gap-4 md:space-y-0">
                        ${recentFilesHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // 2. Tampilan Pencarian (Search/Daftar)
        function renderSearch() {
            let filesHtml = '';
            if (isLoading) {
                filesHtml = `<div class="col-span-full text-center py-6 text-slate-400"><i data-lucide="loader" class="w-6 h-6 animate-spin mx-auto mb-2 text-monster"></i> Memuat data...</div>`;
            } else {
                filesHtml = dataArsip.map(file => createFileCard(file)).join('');
            }

            contentArea.innerHTML = `
                <div class="fade-in h-full flex flex-col">
                    <div class="relative mb-6">
                        <input type="text" id="searchInput" placeholder="Cari nama file, kategori..." 
                            class="w-full glass-input rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-400"
                            onkeyup="handleSearch()">
                        <i data-lucide="search" class="absolute left-4 top-3.5 text-slate-400 w-5 h-5"></i>
                    </div>
                    
                    <div id="searchResults" class="space-y-3 md:grid md:grid-cols-2 lg:grid-cols-3 md:gap-4 md:space-y-0 overflow-y-auto pb-4">
                        ${filesHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
            setTimeout(() => document.getElementById('searchInput')?.focus(), 100);
        }

        // 3. Tampilan Form Input Data
        function renderInput() {
            contentArea.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                        <i data-lucide="upload-cloud" class="text-monster"></i> Upload Arsip Baru
                    </h2>
                    
                    <form id="uploadForm" onsubmit="handleUpload(event)" class="space-y-5">
                        
                        <!-- Area Drop File -->
                        <div class="border-2 border-dashed border-slate-600 rounded-2xl p-8 text-center hover:border-monster hover:bg-monster/5 transition-colors cursor-pointer relative" id="dropArea">
                            <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png" required>
                            <i data-lucide="folder-up" class="w-10 h-10 text-slate-400 mx-auto mb-3"></i>
                            <p class="text-sm text-slate-300 font-medium" id="fileNameDisplay">Ketuk untuk memilih file dokumen</p>
                            <p class="text-xs text-slate-500 mt-1">Mendukung PDF, DOCX, PPTX, XLSX, JPG (Max 10MB)</p>
                        </div>

                        <div class="md:grid md:grid-cols-2 md:gap-4 space-y-5 md:space-y-0">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1 ml-1">Nama Dokumen (Otomatis)</label>
                                <input type="text" id="docName" readonly placeholder="Terisi otomatis dari file..." class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl py-3 px-4 text-slate-400 cursor-not-allowed focus:outline-none">
                            </div>

                            <div>
                                <label class="block text-xs text-slate-400 mb-1 ml-1">Kategori (Otomatis)</label>
                                <input type="text" id="docCategory" readonly placeholder="Terdeteksi otomatis..." class="w-full bg-slate-800/50 border border-slate-700/50 rounded-xl py-3 px-4 text-monster font-semibold cursor-not-allowed focus:outline-none">
                            </div>
                        </div>

                        <button type="submit" id="btnSubmit" class="w-full bg-monster hover:bg-monsterDark text-darkBg font-bold py-3.5 rounded-xl transition-all shadow-[0_0_15px_rgba(57,255,20,0.3)] mt-4 flex justify-center items-center gap-2 md:w-1/2 md:mx-auto">
                            <i data-lucide="save" class="w-5 h-5"></i> Simpan ke Drive
                        </button>
                    </form>
                </div>
            `;
            lucide.createIcons();

            // Interaksi nama file dan deteksi kategori
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if(file) {
                    const fullName = file.name;
                    // Hilangkan ekstensi untuk nama dokumen
                    const nameWithoutExt = fullName.substring(0, fullName.lastIndexOf('.')) || fullName;
                    
                    document.getElementById('fileNameDisplay').innerHTML = `<span class="text-monster font-semibold">${fullName}</span>`;
                    
                    // Isi nama dokumen secara otomatis (terkunci)
                    document.getElementById('docName').value = nameWithoutExt;

                    // Logika deteksi kategori dari nama file
                    let detectedCategory = 'Umum'; // Default
                    const lowerName = nameWithoutExt.toLowerCase();

                    if (lowerName.includes('sk') || lowerName.includes('keputusan')) {
                        detectedCategory = 'SK (Surat Keputusan)';
                    } else if (lowerName.includes('st') || lowerName.includes('tugas')) {
                        detectedCategory = 'ST (Surat Tugas)';
                    } else if (lowerName.includes('laporan') || lowerName.includes('lap')) {
                        detectedCategory = 'Laporan';
                    } else if (lowerName.includes('keuangan') || lowerName.includes('uang') || lowerName.includes('invoice')) {
                        detectedCategory = 'Keuangan';
                    } else if (lowerName.includes('hrd') || lowerName.includes('pegawai') || lowerName.includes('kontrak')) {
                        detectedCategory = 'Kepegawaian';
                    } else if (lowerName.includes('undangan')) {
                        detectedCategory = 'Undangan';
                    }

                    // Isi kategori secara otomatis (terkunci)
                    document.getElementById('docCategory').value = detectedCategory;
                }
            });
        }

        // 4. Tampilan Drive (Folder View)
        function renderDrive() {
            let filesHtml = '';
            if (isLoading) {
                filesHtml = `<div class="col-span-full text-center py-6 text-slate-400"><i data-lucide="loader" class="w-6 h-6 animate-spin mx-auto mb-2 text-monster"></i> Memuat isi Drive...</div>`;
            } else if (dataArsip.length === 0) {
                filesHtml = `<div class="col-span-full text-center py-6 text-slate-400">Drive masih kosong.</div>`;
            } else {
                filesHtml = dataArsip.map(file => createFileCard(file)).join('');
            }

            contentArea.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                        <i data-lucide="hard-drive" class="text-monster"></i> Penyimpanan Drive
                    </h2>
                    <div class="bg-slate-800/50 p-4 rounded-xl mb-6 border border-slate-700 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-monster/10 rounded-lg"><i data-lucide="folder" class="w-5 h-5 text-monster"></i></div>
                            <div>
                                <p class="text-sm text-white font-medium">Database E-Arsip</p>
                                <p class="text-xs text-slate-400">${dataArsip.length} Dokumen Tersimpan</p>
                            </div>
                        </div>
                        <button onclick="fetchData()" class="p-2 text-slate-400 hover:text-white transition rounded-lg hover:bg-slate-700">
                            <i data-lucide="refresh-cw" class="w-5 h-5 ${isLoading ? 'animate-spin text-monster' : ''}"></i>
                        </button>
                    </div>
                    
                    <h3 class="text-sm font-semibold text-slate-300 mb-3">Semua File</h3>
                    <div class="space-y-3 md:grid md:grid-cols-2 lg:grid-cols-3 md:gap-4 md:space-y-0 pb-4">
                        ${filesHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // 5. Tampilan Pengaturan
        function renderSettings() {
            const isConnected = !GAS_API_URL.includes('AKfycb...');
            
            contentArea.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                        <i data-lucide="settings" class="text-monster"></i> Pengaturan Sistem
                    </h2>
                    
                    <div class="glass p-5 rounded-2xl space-y-5">
                        <!-- Status Koneksi -->
                        <div>
                            <h3 class="text-sm font-medium text-slate-300 mb-2">Status Koneksi API</h3>
                            <div class="flex items-center gap-3 p-3 rounded-xl border ${isConnected ? 'bg-monster/10 border-monster/30' : 'bg-red-500/10 border-red-500/30'}">
                                <i data-lucide="${isConnected ? 'check-circle' : 'alert-circle'}" class="w-6 h-6 ${isConnected ? 'text-monster' : 'text-red-400'}"></i>
                                <div>
                                    <p class="text-sm font-semibold ${isConnected ? 'text-monster' : 'text-red-400'}">
                                        ${isConnected ? 'Terhubung ke Google Drive' : 'Belum Terhubung'}
                                    </p>
                                    <p class="text-[10px] text-slate-400">
                                        ${isConnected ? 'Sistem dapat membaca dan menyimpan file.' : 'Harap ganti GAS_API_URL di dalam kode index.html.'}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <!-- Info Aplikasi -->
                        <div class="border-t border-slate-700/50 pt-4">
                            <h3 class="text-sm font-medium text-slate-300 mb-3">Informasi Aplikasi</h3>
                            <div class="space-y-2 text-xs text-slate-400">
                                <div class="flex justify-between border-b border-slate-800 pb-2">
                                    <span>Versi</span>
                                    <span class="text-white">v1.2 (Monster Edition)</span>
                                </div>
                                <div class="flex justify-between border-b border-slate-800 pb-2">
                                    <span>Penyimpanan</span>
                                    <span class="text-white">Google Drive via GAS</span>
                                </div>
                                <div class="flex justify-between pb-2">
                                    <span>Frontend</span>
                                    <span class="text-white">Vercel & Tailwind CSS</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderPlaceholder(title) {
            contentArea.innerHTML = `
                <div class="fade-in h-full flex flex-col items-center justify-center text-center opacity-50">
                    <i data-lucide="construction" class="w-16 h-16 text-slate-500 mb-4"></i>
                    <h2 class="text-lg font-bold text-white">Modul ${title}</h2>
                    <p class="text-sm text-slate-400">Dalam tahap pengembangan</p>
                </div>
            `;
            lucide.createIcons();
        }

        // --- FUNGSI PENDUKUNG ---

        // Membuat HTML Card File (Klik untuk membuka/download file)
        function createFileCard(file) {
            let icon = 'file'; 
            let color = 'text-slate-400'; 
            let bg = 'bg-slate-700';
            
            // Konversi ekstensi ke lowercase untuk pengecekan
            const tipe = file.tipe ? file.tipe.toLowerCase() : '';

            // Deteksi Ekstensi & Ikon Secara Akurat
            if(tipe === 'pdf') { 
                icon = 'file-text'; color = 'text-red-400'; bg = 'bg-red-400/10'; 
            }
            else if(['doc', 'docx'].includes(tipe)) { 
                icon = 'file-text'; color = 'text-blue-400'; bg = 'bg-blue-400/10'; 
            }
            else if(['xls', 'xlsx', 'csv'].includes(tipe)) { 
                icon = 'table'; color = 'text-green-400'; bg = 'bg-green-400/10'; 
            }
            else if(['ppt', 'pptx'].includes(tipe)) { 
                icon = 'presentation'; color = 'text-orange-400'; bg = 'bg-orange-400/10'; 
            }
            else if(['jpg', 'jpeg', 'png'].includes(tipe)) { 
                icon = 'image'; color = 'text-purple-400'; bg = 'bg-purple-400/10'; 
            }

            // Fungsi onclick ditambahkan di div terluar agar seluruh card dapat diklik
            return `
                <div onclick="window.open('${file.url}', '_blank')" class="glass p-3.5 rounded-2xl flex items-center justify-between border border-transparent hover:border-monster/50 transition-all cursor-pointer group shadow-sm hover:shadow-monster/20">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="p-2.5 rounded-xl ${bg} ${color} shrink-0 group-hover:scale-110 transition-transform">
                            <i data-lucide="${icon}" class="w-5 h-5"></i>
                        </div>
                        <div class="min-w-0">
                            <h3 class="font-semibold text-sm text-white truncate group-hover:text-monster transition-colors">${file.nama}</h3>
                            <div class="flex items-center gap-2 mt-0.5 text-[10px] text-slate-400">
                                <span>${file.tanggal || '-'}</span>
                                <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                                <span>${file.ukuran || '-'}</span>
                                <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                                <span class="text-monster/80 border border-monster/30 px-1.5 rounded-md">${file.kategori || 'Umum'}</span>
                            </div>
                        </div>
                    </div>
                    <button class="text-slate-500 hover:text-monster p-2 shrink-0">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </button>
                </div>
            `;
        }

        function createCategoryBtn(icon, label, colorClass, bgClass) {
            return `
                <button class="flex flex-col items-center justify-center p-3 rounded-2xl glass hover:border-monster/40 transition-colors hover:shadow-[0_0_10px_rgba(57,255,20,0.2)]">
                    <div class="${bgClass} ${colorClass} p-2 rounded-xl mb-2">
                        <i data-lucide="${icon}" class="w-5 h-5"></i>
                    </div>
                    <span class="text-[10px] font-medium text-slate-300">${label}</span>
                </button>
            `;
        }

        // Logika Pencarian Real-time
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const resultsContainer = document.getElementById('searchResults');
            
            const filtered = dataArsip.filter(file => 
                file.nama.toLowerCase().includes(query) || 
                (file.kategori && file.kategori.toLowerCase().includes(query)) ||
                (file.tipe && file.tipe.toLowerCase().includes(query))
            );

            if(filtered.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="col-span-full text-center py-10 opacity-50">
                        <i data-lucide="file-search" class="w-12 h-12 text-slate-500 mx-auto mb-3"></i>
                        <p class="text-sm text-slate-400">Pencarian "${query}" tidak ditemukan</p>
                    </div>`;
            } else {
                resultsContainer.innerHTML = filtered.map(file => createFileCard(file)).join('');
            }
            lucide.createIcons();
        }

        // Proses Upload Real ke Google Drive
        function handleUpload(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const fileInput = document.getElementById('fileInput');
            const docName = document.getElementById('docName').value;
            const docCategory = document.getElementById('docCategory').value;

            if(fileInput.files.length === 0) {
                alert("Pilih file terlebih dahulu!");
                return;
            }

            const file = fileInput.files[0];

            // Cek jika URL belum di-set
            if(GAS_API_URL.includes('AKfycb...')) {
                alert("Anda belum memasukkan URL API Google Apps Script. Data tidak dapat diunggah ke Drive.");
                return;
            }

            // UI Loading state
            btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Mengunggah ke Drive...`;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            btn.disabled = true;
            lucide.createIcons();

            // Membaca file dan mengirim ke GAS via Base64
            const reader = new FileReader();
            reader.onload = function(event) {
                // Mengambil string base64 murni tanpa header mime-type
                const base64Data = event.target.result.split(',')[1];
                
                const payload = {
                    fileName: file.name,
                    mimeType: file.type,
                    fileData: base64Data
                };

                fetch(GAS_API_URL, {
                    method: 'POST',
                    // Menambahkan headers Content-Type text/plain agar tidak terkena error CORS preflight
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(res => {
                    if(res.status === 'success') {
                        showToast('File berhasil terkirim ke Google Drive!');
                        // Reset input form
                        fileInput.value = '';
                        document.getElementById('docName').value = '';
                        document.getElementById('docCategory').value = '';
                        document.getElementById('fileNameDisplay').innerText = 'Ketuk untuk memilih file dokumen';
                        
                        resetBtn();
                        fetchData(); // Refresh data dari drive setelah upload sukses
                    } else {
                        alert("Gagal mengunggah: " + (res.message || "Unknown Error"));
                        resetBtn();
                    }
                })
                .catch(err => {
                    console.error("Upload error:", err);
                    alert("Kesalahan jaringan. Pastikan URL Web App benar dan bisa diakses.");
                    resetBtn();
                });
            };
            
            // Eksekusi pembacaan file
            reader.readAsDataURL(file);

            function resetBtn() {
                btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> Simpan ke Drive`;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        // Sistem Navigasi & Active State
        function navigate(view) {
            // Update Active Menu
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-monster');
                btn.classList.add('text-slate-400');
            });
            
            const activeBtn = document.getElementById(`nav-${view}`);
            if(activeBtn) {
                activeBtn.classList.remove('text-slate-400');
                activeBtn.classList.add('text-monster');
            }

            // Render view berdasarkan pilihan menu
            if(view === 'dashboard') renderDashboard();
            else if(view === 'search') renderSearch();
            else if(view === 'input') renderInput();
            else if(view === 'drive') renderDrive();
            else if(view === 'settings') renderSettings();
            else renderPlaceholder(view.charAt(0).toUpperCase() + view.slice(1));
        }

        // Sistem Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            
            toast.classList.remove('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        // Inisialisasi awal
        window.onload = () => {
            fetchData(); // Mulai dengan menarik data dari Google Drive
        };

    </script>
</body>
</html>
