<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Arsip Pro | Monster Edition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Config untuk Warna Hijau Monster -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        monster: '#39FF14', // Hijau Monster Neon
                        monsterDark: '#2ebd0d',
                        darkBg: '#0b1121', // Latar belakang gelap
                        glassBg: 'rgba(17, 24, 39, 0.7)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            background-color: #0b1121;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(114,100%,54%,0.05) 0, transparent 50%);
            color: #e2e8f0;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none; /* Mencegah efek bounce/refresh saat di-scroll mentok di HP */
        }

        /* Efek Kaca (Glassmorphism) */
        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(57, 255, 20, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .glass-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            border-color: #39FF14;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
            outline: none;
        }

        /* Sembunyikan Scrollbar tapi tetap bisa di-scroll */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(57, 255, 20, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(57, 255, 20, 0.6); }

        /* Animasi Transisi Halaman */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Padding tambahan untuk area bawah agar tidak tertutup Navigasi/Safe Area iPhone */
        .pb-safe-nav {
            padding-bottom: calc(5.5rem + env(safe-area-inset-bottom, 1rem));
        }
        
        .nav-safe-bottom {
            padding-bottom: env(safe-area-inset-bottom, 0.5rem);
        }
    </style>
</head>
<body class="h-[100dvh] flex flex-col overflow-hidden font-sans">

    <!-- Kontainer Utama Aplikasi -->
    <div class="flex-1 w-full max-w-md md:max-w-5xl lg:max-w-6xl mx-auto relative flex flex-col h-full glass border-x-0 sm:border-x border-monster/20 sm:my-4 sm:rounded-3xl shadow-2xl shadow-monster/5 overflow-hidden">
        
        <!-- Header -->
        <header class="px-6 pt-6 pb-4 z-10 shrink-0">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-white tracking-wide">E-<span class="text-monster drop-shadow-[0_0_8px_rgba(57,255,20,0.5)]">Arsip</span></h1>
                    <p class="text-[11px] md:text-xs text-slate-400 mt-0.5">Sistem Manajemen Dokumen</p>
                </div>
                <div class="w-10 h-10 rounded-full border border-monster flex items-center justify-center bg-slate-800 shadow-[0_0_10px_rgba(57,255,20,0.2)]">
                    <i data-lucide="user" class="text-monster w-5 h-5"></i>
                </div>
            </div>
        </header>

        <!-- Area Konten Dinamis -->
        <main id="app-content" class="flex-1 overflow-y-auto px-6 pb-safe-nav fade-in scroll-smooth">
            <!-- Konten akan di-render di sini oleh JavaScript -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="absolute bottom-0 w-full glass rounded-b-none sm:rounded-b-3xl border-t border-monster/20 z-20 nav-safe-bottom">
            <div class="flex justify-between md:justify-center md:gap-24 items-center h-16 px-6 relative">
                
                <button onclick="navigate('dashboard')" id="nav-dashboard" class="nav-btn flex flex-col items-center justify-center gap-1 text-monster transition-colors w-14">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="text-[9px] font-medium">Beranda</span>
                </button>
                
                <button onclick="navigate('search')" id="nav-search" class="nav-btn flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-monster transition-colors w-14">
                    <i data-lucide="search" class="w-5 h-5"></i>
                    <span class="text-[9px] font-medium">Cari</span>
                </button>
                
                <!-- Tombol Tambah Tengah (Floating) Simetris Mutlak -->
                <div class="w-14 flex justify-center">
                    <button onclick="navigate('input')" class="absolute -top-6 w-14 h-14 rounded-full bg-monster hover:bg-monsterDark text-darkBg flex items-center justify-center shadow-[0_0_15px_rgba(57,255,20,0.4)] transition-transform hover:scale-105 active:scale-95 border-4 border-[#0b1121]">
                        <i data-lucide="plus" class="w-7 h-7"></i>
                    </button>
                </div>

                <button onclick="navigate('drive')" id="nav-drive" class="nav-btn flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-monster transition-colors w-14">
                    <i data-lucide="hard-drive" class="w-5 h-5"></i>
                    <span class="text-[9px] font-medium">Drive</span>
                </button>
                
                <button onclick="navigate('settings')" id="nav-settings" class="nav-btn flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-monster transition-colors w-14">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span class="text-[9px] font-medium">Sistem</span>
                </button>

            </div>
        </nav>
    </div>

    <!-- Notifikasi Toast -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-monster text-darkBg px-4 py-2.5 rounded-xl font-bold shadow-lg shadow-monster/40 transition-all duration-300 opacity-0 translate-y-[-20px] pointer-events-none z-50 flex items-center gap-2 text-sm w-max">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-msg">Berhasil!</span>
    </div>

    <!-- Logika Aplikasi (JavaScript) -->
    <script>
        // Inisialisasi Ikon
        lucide.createIcons();

        // --- KONFIGURASI API ---
        // PASTIKAN ANDA MENGGANTI URL DI BAWAH INI DENGAN URL WEB APP GAS ANDA
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbynbDyrrPkY6vBkJkryaHItZX1UTsqJQWbHHpHKLRARcVXlSeCf97Xj4wjgdZCL4rrN/exec'; 

        // --- DATA STATE ---
        let dataArsip = [];
        let isLoading = true;

        // --- FUNGSI MENGAMBIL DATA DARI GAS ---
        async function fetchData() {
            isLoading = true;
            
            // Tampilkan Skeleton UI sesuai halaman aktif saat ini
            const activeNav = document.querySelector('.nav-btn.text-monster');
            const view = activeNav ? activeNav.id.replace('nav-', '') : 'dashboard';
            navigate(view); 
            
            try {
                if(GAS_API_URL.includes('AKfycb...')) {
                    console.warn("Menggunakan data Mockup karena URL API belum diganti.");
                    // Delay simulasi untuk memperlihatkan animasi skeleton yang elegan
                    await new Promise(resolve => setTimeout(resolve, 1500)); 
                    dataArsip = [
                        { id: 1, nama: 'Contoh_Laporan_Belum_Konek.pdf', tipe: 'pdf', tanggal: '16 Apr 2026', ukuran: '2.4 MB', kategori: 'DATA', url: '#' },
                        { id: 2, nama: 'SK_Pegawai.xlsx', tipe: 'xlsx', tanggal: '15 Apr 2026', ukuran: '1.1 MB', kategori: 'SK', url: '#' }
                    ];
                } else {
                    const response = await fetch(GAS_API_URL);
                    const result = await response.json();
                    
                    if(Array.isArray(result)) {
                        dataArsip = result.reverse(); 
                    } else if(result.error) {
                        showToast("Error dari Drive: " + result.error);
                    }
                }
            } catch (error) {
                console.error("Gagal mengambil data:", error);
                showToast("Gagal terhubung ke Database Google Drive.");
            } finally {
                isLoading = false;
                navigate(view); // Render data asli
            }
        }

        // --- RENDERER HALAMAN ---
        const contentArea = document.getElementById('app-content');

        // 1. Tampilan Dashboard Utama
        function renderDashboard() {
            let totalFiles = isLoading ? '-' : dataArsip.length;
            
            let recentFilesHtml = '';
            if (isLoading) {
                recentFilesHtml = createSkeletonCard() + createSkeletonCard() + createSkeletonCard();
            } else if (dataArsip.length === 0) {
                recentFilesHtml = `<div class="col-span-full text-center py-6 text-slate-500 text-sm">Belum ada dokumen di Drive.</div>`;
            } else {
                recentFilesHtml = dataArsip.slice(0, 3).map(file => createFileCard(file)).join('');
            }

            contentArea.innerHTML = `
                <div class="fade-in">
                    <!-- Kartu Statistik -->
                    <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-5 rounded-2xl border border-slate-700 shadow-lg relative overflow-hidden mb-6 mt-2">
                        <div class="absolute -right-4 -top-4 w-28 h-28 bg-monster/10 rounded-full blur-2xl"></div>
                        <h2 class="text-slate-300 text-xs font-medium uppercase tracking-wider">Total Dokumen Arsip</h2>
                        <div class="flex items-end gap-3 mt-2">
                            <span class="text-4xl font-bold text-white">${totalFiles}</span>
                            <span class="text-monster text-[10px] font-medium mb-1.5 flex items-center bg-monster/10 px-2 py-0.5 rounded-full border border-monster/20">
                                <i data-lucide="cloud-lightning" class="w-3 h-3 mr-1"></i> Tersinkronisasi
                            </span>
                        </div>
                    </div>

                    <!-- Kategori Cepat -->
                    <div class="grid grid-cols-4 md:grid-cols-8 gap-3 mb-8">
                        ${createCategoryBtn('pdf', 'PDF', 'text-red-400', 'bg-red-400/10')}
                        ${createCategoryBtn('file-text', 'Word', 'text-blue-400', 'bg-blue-400/10')}
                        ${createCategoryBtn('presentation', 'PPT', 'text-orange-400', 'bg-orange-400/10')}
                        ${createCategoryBtn('table', 'Excel', 'text-green-400', 'bg-green-400/10')}
                    </div>

                    <!-- Arsip Terbaru -->
                    <div class="flex justify-between items-end mb-4 px-1">
                        <h3 class="text-base font-bold text-white">Arsip Terbaru</h3>
                        <button onclick="navigate('search')" class="text-xs text-monster hover:text-white transition-colors">Lihat Semua</button>
                    </div>
                    <div class="space-y-3 md:grid md:grid-cols-2 lg:grid-cols-3 md:gap-4 md:space-y-0 pb-2">
                        ${recentFilesHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // 2. Tampilan Pencarian (Search/Daftar)
        function renderSearch() {
            let filesHtml = '';
            if (isLoading) {
                filesHtml = createSkeletonCard().repeat(5);
            } else {
                filesHtml = dataArsip.map(file => createFileCard(file)).join('');
            }

            contentArea.innerHTML = `
                <div class="fade-in h-full flex flex-col pt-2">
                    <div class="relative mb-6 shrink-0">
                        <input type="text" id="searchInput" placeholder="Cari nama, kategori, pdf..." 
                            class="w-full glass-input rounded-2xl py-3.5 pl-12 pr-4 text-sm text-white placeholder-slate-500 shadow-inner"
                            onkeyup="handleSearch()">
                        <i data-lucide="search" class="absolute left-4 top-3.5 text-monster/70 w-5 h-5"></i>
                    </div>
                    
                    <div id="searchResults" class="space-y-3 md:grid md:grid-cols-2 lg:grid-cols-3 md:gap-4 md:space-y-0 pb-2">
                        ${filesHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
            if(!isLoading) setTimeout(() => document.getElementById('searchInput')?.focus(), 100);
        }

        // 3. Tampilan Form Input Data
        function renderInput() {
            contentArea.innerHTML = `
                <div class="fade-in pt-2">
                    <h2 class="text-lg font-bold text-white mb-6 flex items-center gap-2">
                        <i data-lucide="cloud-upload" class="text-monster w-5 h-5"></i> Form Upload Arsip
                    </h2>
                    
                    <form id="uploadForm" onsubmit="handleUpload(event)" class="space-y-5">
                        
                        <!-- Area Drop File -->
                        <div class="border-2 border-dashed border-slate-600 rounded-2xl p-8 text-center hover:border-monster hover:bg-monster/5 transition-all cursor-pointer relative group" id="dropArea">
                            <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png" required>
                            <div class="bg-slate-800 p-3 rounded-full w-max mx-auto mb-3 group-hover:scale-110 transition-transform group-hover:bg-monster/20">
                                <i data-lucide="folder-up" class="w-8 h-8 text-slate-400 group-hover:text-monster"></i>
                            </div>
                            <p class="text-sm text-slate-300 font-medium" id="fileNameDisplay">Ketuk untuk memilih file dokumen</p>
                            <p class="text-[10px] text-slate-500 mt-2">Format: PDF, Word, Excel, PPT, JPG (Max 10MB)</p>
                        </div>

                        <div class="md:grid md:grid-cols-2 md:gap-4 space-y-5 md:space-y-0">
                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1.5 ml-1 font-medium">Nama Dokumen (Otomatis)</label>
                                <input type="text" id="docName" readonly placeholder="Terisi otomatis..." class="w-full bg-slate-800/80 border border-slate-700/50 rounded-xl py-3 px-4 text-sm text-slate-400 cursor-not-allowed focus:outline-none">
                            </div>

                            <div>
                                <label class="block text-[11px] text-slate-400 mb-1.5 ml-1 font-medium">Kategori (Auto / Manual)</label>
                                <select id="docCategory" class="w-full bg-slate-800/80 border border-slate-700/50 rounded-xl py-3 px-4 text-sm text-monster font-semibold focus:outline-none focus:border-monster/50 transition-colors cursor-pointer">
                                    <option value="FILE">FILE</option>
                                    <option value="SURAT MASUK">SURAT MASUK</option>
                                    <option value="SURAT KELUAR">SURAT KELUAR</option>
                                    <option value="PEMBERITAHUAN">PEMBERITAHUAN</option>
                                    <option value="SK">SK</option>
                                    <option value="DATA">DATA</option>
                                    <option value="LAINYA">LAINYA</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" id="btnSubmit" class="w-full bg-monster hover:bg-monsterDark text-darkBg font-bold py-3.5 rounded-xl transition-all shadow-[0_0_20px_rgba(57,255,20,0.25)] mt-4 flex justify-center items-center gap-2 md:w-1/2 md:mx-auto">
                            <i data-lucide="hard-drive-upload" class="w-5 h-5"></i> Simpan ke Database
                        </button>
                    </form>
                </div>
            `;
            lucide.createIcons();

            // Interaksi nama file dan deteksi kategori
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if(file) {
                    const fullName = file.name;
                    const nameWithoutExt = fullName.substring(0, fullName.lastIndexOf('.')) || fullName;
                    
                    document.getElementById('fileNameDisplay').innerHTML = `<span class="text-monster font-semibold truncate block px-4">${fullName}</span>`;
                    document.getElementById('docName').value = nameWithoutExt;

                    let detectedCategory = 'FILE'; // Kategori Default
                    const lowerName = nameWithoutExt.toLowerCase();

                    // Logika pendeteksian otomatis berdasarkan daftar opsi baru
                    if (lowerName.includes('sk') || lowerName.includes('keputusan')) detectedCategory = 'SK';
                    else if (lowerName.includes('masuk')) detectedCategory = 'SURAT MASUK';
                    else if (lowerName.includes('keluar')) detectedCategory = 'SURAT KELUAR';
                    else if (lowerName.includes('pemberitahuan') || lowerName.includes('undangan') || lowerName.includes('edaran')) detectedCategory = 'PEMBERITAHUAN';
                    else if (lowerName.includes('data') || lowerName.includes('laporan') || lowerName.includes('keuangan')) detectedCategory = 'DATA';
                    else if (lowerName.includes('lain')) detectedCategory = 'LAINYA';

                    document.getElementById('docCategory').value = detectedCategory;
                }
            });
        }

        // 4. Tampilan Drive (Folder View)
        function renderDrive() {
            let filesHtml = '';
            if (isLoading) {
                filesHtml = createSkeletonCard().repeat(5);
            } else if (dataArsip.length === 0) {
                filesHtml = `<div class="col-span-full text-center py-10 text-slate-500 text-sm">Drive masih kosong.</div>`;
            } else {
                filesHtml = dataArsip.map(file => createFileCard(file)).join('');
            }

            contentArea.innerHTML = `
                <div class="fade-in pt-2">
                    <h2 class="text-lg font-bold text-white mb-6 flex items-center gap-2">
                        <i data-lucide="folder-kanban" class="text-monster w-5 h-5"></i> Direktori Google Drive
                    </h2>
                    
                    <div class="glass p-4 rounded-2xl mb-6 flex justify-between items-center shadow-md">
                        <div class="flex items-center gap-3">
                            <div class="p-2.5 bg-monster/10 rounded-xl border border-monster/20"><i data-lucide="database" class="w-5 h-5 text-monster"></i></div>
                            <div>
                                <p class="text-sm text-white font-bold">Database E-Arsip</p>
                                <p class="text-[10px] text-slate-400 mt-0.5">${isLoading ? 'Memuat...' : dataArsip.length + ' Dokumen Terindeks'}</p>
                            </div>
                        </div>
                        <button onclick="fetchData()" class="p-2.5 text-slate-400 hover:text-monster hover:bg-monster/10 transition-colors rounded-xl border border-transparent hover:border-monster/30">
                            <i data-lucide="refresh-cw" class="w-5 h-5 ${isLoading ? 'animate-spin text-monster' : ''}"></i>
                        </button>
                    </div>
                    
                    <h3 class="text-xs font-semibold text-slate-400 mb-3 px-1 uppercase tracking-wider">Semua File Tersimpan</h3>
                    <div class="space-y-3 md:grid md:grid-cols-2 lg:grid-cols-3 md:gap-4 md:space-y-0 pb-2">
                        ${filesHtml}
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // 5. Tampilan Pengaturan
        function renderSettings() {
            const isConnected = !GAS_API_URL.includes('AKfycb...');
            
            contentArea.innerHTML = `
                <div class="fade-in pt-2">
                    <h2 class="text-lg font-bold text-white mb-6 flex items-center gap-2">
                        <i data-lucide="sliders-horizontal" class="text-monster w-5 h-5"></i> Pengaturan Sistem
                    </h2>
                    
                    <div class="glass p-6 rounded-3xl space-y-6">
                        <!-- Status Koneksi -->
                        <div>
                            <h3 class="text-[11px] font-bold text-slate-400 mb-3 uppercase tracking-wider">Status Integrasi API</h3>
                            <div class="flex items-center gap-4 p-4 rounded-2xl border ${isConnected ? 'bg-monster/5 border-monster/30' : 'bg-red-500/5 border-red-500/30'}">
                                <div class="p-2 rounded-full ${isConnected ? 'bg-monster/20' : 'bg-red-500/20'} shrink-0">
                                    <i data-lucide="${isConnected ? 'link' : 'link-2-off'}" class="w-5 h-5 ${isConnected ? 'text-monster' : 'text-red-400'}"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-bold ${isConnected ? 'text-monster' : 'text-red-400'}">
                                        ${isConnected ? 'Google Drive Terhubung' : 'API Belum Terhubung'}
                                    </p>
                                    <p class="text-[10px] text-slate-400 mt-1 leading-relaxed">
                                        ${isConnected ? 'Aplikasi dapat melakukan sinkronisasi data dua arah dengan aman.' : 'Sistem tidak dapat berfungsi. Harap masukkan URL Google Apps Script.'}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <!-- Info Aplikasi -->
                        <div class="border-t border-slate-700/50 pt-5">
                            <h3 class="text-[11px] font-bold text-slate-400 mb-3 uppercase tracking-wider">Informasi Teknis</h3>
                            <div class="space-y-3 text-xs text-slate-300">
                                <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl">
                                    <span class="flex items-center gap-2"><i data-lucide="tag" class="w-4 h-4 text-slate-500"></i> Versi Aplikasi</span>
                                    <span class="font-bold text-white">v2.0 (Blueprint)</span>
                                </div>
                                <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl">
                                    <span class="flex items-center gap-2"><i data-lucide="server" class="w-4 h-4 text-slate-500"></i> Basis Data</span>
                                    <span class="font-bold text-white text-right">G-Drive & Apps Script</span>
                                </div>
                                <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl">
                                    <span class="flex items-center gap-2"><i data-lucide="code" class="w-4 h-4 text-slate-500"></i> Frontend Engine</span>
                                    <span class="font-bold text-white text-right">Tailwind & Vanilla JS</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // --- FUNGSI PENDUKUNG ---

        // HTML Untuk Skeleton Loading (Rangka Pemuatan)
        function createSkeletonCard() {
            return `
                <div class="glass p-3.5 rounded-2xl flex items-center justify-between border border-transparent animate-pulse shadow-sm">
                    <div class="flex items-center gap-3 overflow-hidden w-full">
                        <div class="w-10 h-10 rounded-xl bg-slate-700/50 shrink-0"></div>
                        <div class="flex-1 w-full space-y-2.5">
                            <div class="h-3 bg-slate-600/50 rounded w-3/4"></div>
                            <div class="flex items-center gap-2">
                                <div class="h-2 bg-slate-700/50 rounded w-12"></div>
                                <div class="w-1 h-1 rounded-full bg-slate-600/50"></div>
                                <div class="h-2 bg-slate-700/50 rounded w-10"></div>
                                <div class="w-1 h-1 rounded-full bg-slate-600/50"></div>
                                <div class="h-3 bg-slate-700/50 rounded w-16"></div>
                            </div>
                        </div>
                    </div>
                    <div class="w-6 h-6 bg-slate-700/50 rounded-md shrink-0 ml-3"></div>
                </div>
            `;
        }

        // Membuat HTML Card File Aktual
        function createFileCard(file) {
            let icon = 'file'; 
            let color = 'text-slate-400'; 
            let bg = 'bg-slate-700';
            
            const tipe = file.tipe ? file.tipe.toLowerCase() : '';

            if(tipe === 'pdf') { icon = 'file-text'; color = 'text-red-400'; bg = 'bg-red-400/10'; }
            else if(['doc', 'docx'].includes(tipe)) { icon = 'file-text'; color = 'text-blue-400'; bg = 'bg-blue-400/10'; }
            else if(['xls', 'xlsx', 'csv'].includes(tipe)) { icon = 'table'; color = 'text-green-400'; bg = 'bg-green-400/10'; }
            else if(['ppt', 'pptx'].includes(tipe)) { icon = 'presentation'; color = 'text-orange-400'; bg = 'bg-orange-400/10'; }
            else if(['jpg', 'jpeg', 'png'].includes(tipe)) { icon = 'image'; color = 'text-purple-400'; bg = 'bg-purple-400/10'; }

            return `
                <div onclick="window.open('${file.url}', '_blank')" class="glass p-3.5 rounded-2xl flex items-center justify-between border border-transparent hover:border-monster/40 transition-all cursor-pointer group shadow-sm hover:shadow-monster/10">
                    <div class="flex items-center gap-3.5 overflow-hidden w-full">
                        <div class="p-2.5 rounded-xl ${bg} ${color} shrink-0 group-hover:scale-110 transition-transform duration-300">
                            <i data-lucide="${icon}" class="w-5 h-5"></i>
                        </div>
                        <div class="min-w-0 flex-1">
                            <h3 class="font-bold text-sm text-slate-100 truncate group-hover:text-monster transition-colors">${file.nama}</h3>
                            <div class="flex items-center gap-2 mt-1 text-[9px] text-slate-400 font-medium">
                                <span>${file.tanggal || '-'}</span>
                                <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                                <span>${file.ukuran || '-'}</span>
                                <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                                <span class="text-monster/90 border border-monster/20 bg-monster/5 px-1.5 py-0.5 rounded-md truncate">${file.kategori || 'FILE'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="text-slate-500 group-hover:text-monster group-hover:bg-monster/10 p-2 rounded-lg shrink-0 ml-2 transition-colors">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </div>
                </div>
            `;
        }

        function createCategoryBtn(icon, label, colorClass, bgClass) {
            return `
                <button class="flex flex-col items-center justify-center p-3 rounded-2xl glass hover:border-monster/40 transition-all hover:shadow-[0_0_15px_rgba(57,255,20,0.15)] group">
                    <div class="${bgClass} ${colorClass} p-2 rounded-xl mb-2 group-hover:scale-110 transition-transform duration-300">
                        <i data-lucide="${icon}" class="w-5 h-5"></i>
                    </div>
                    <span class="text-[10px] font-bold text-slate-300 group-hover:text-white transition-colors">${label}</span>
                </button>
            `;
        }

        // Logika Pencarian Real-time
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const resultsContainer = document.getElementById('searchResults');
            
            const filtered = dataArsip.filter(file => 
                file.nama.toLowerCase().includes(query) || 
                (file.kategori && file.kategori.toLowerCase().includes(query)) ||
                (file.tipe && file.tipe.toLowerCase().includes(query))
            );

            if(filtered.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="col-span-full text-center py-10 opacity-60">
                        <div class="bg-slate-800 p-4 rounded-full w-max mx-auto mb-3">
                            <i data-lucide="file-question" class="w-8 h-8 text-slate-400"></i>
                        </div>
                        <p class="text-sm font-semibold text-slate-300">File tidak ditemukan</p>
                        <p class="text-[10px] text-slate-500 mt-1">Coba gunakan kata kunci lain</p>
                    </div>`;
            } else {
                resultsContainer.innerHTML = filtered.map(file => createFileCard(file)).join('');
            }
            lucide.createIcons();
        }

        // Proses Upload Real ke Google Drive
        function handleUpload(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const fileInput = document.getElementById('fileInput');
            const docCategory = document.getElementById('docCategory').value;

            if(fileInput.files.length === 0) return alert("Pilih file terlebih dahulu!");
            
            if(GAS_API_URL.includes('AKfycb...')) {
                return alert("Fitur dikunci: Harap masukkan URL API Google Apps Script terlebih dahulu.");
            }

            const file = fileInput.files[0];

            btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Mengunggah...`;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            btn.disabled = true;
            lucide.createIcons();

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Data = event.target.result.split(',')[1];
                const payload = { 
                    fileName: file.name, 
                    mimeType: file.type, 
                    fileData: base64Data,
                    // Kategori ini bisa ditangkap di backend (GAS) jika Anda ingin menggunakannya nanti
                    category: docCategory 
                };

                fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(res => {
                    if(res.status === 'success') {
                        showToast('File berhasil diunggah!');
                        // Reset Form
                        fileInput.value = '';
                        document.getElementById('docName').value = '';
                        document.getElementById('docCategory').value = 'FILE';
                        document.getElementById('fileNameDisplay').innerText = 'Ketuk untuk memilih file dokumen';
                        
                        resetBtn();
                        fetchData(); // Muat ulang data terbaru
                    } else {
                        alert("Gagal mengunggah: " + (res.message || "Unknown Error"));
                        resetBtn();
                    }
                })
                .catch(err => {
                    alert("Kesalahan jaringan. Pastikan URL API benar.");
                    resetBtn();
                });
            };
            
            reader.readAsDataURL(file);

            function resetBtn() {
                btn.innerHTML = `<i data-lucide="hard-drive-upload" class="w-5 h-5"></i> Simpan ke Database`;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        // Sistem Navigasi & Active State
        function navigate(view) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-monster');
                btn.classList.add('text-slate-400');
            });
            
            const activeBtn = document.getElementById(`nav-${view}`);
            if(activeBtn) {
                activeBtn.classList.remove('text-slate-400');
                activeBtn.classList.add('text-monster');
            }

            if(view === 'dashboard') renderDashboard();
            else if(view === 'search') renderSearch();
            else if(view === 'input') renderInput();
            else if(view === 'drive') renderDrive();
            else if(view === 'settings') renderSettings();
        }

        // Sistem Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            
            toast.classList.remove('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        // Inisialisasi awal
        window.onload = () => {
            fetchData(); 
        };
    </script>
</body>
</html>
